# Hourly scheduler tick for auto-discovery + the stale-posting liveness sweep.
# The API endpoint is a no-op for users whose /profile Auto-discovery settings
# are off, and per-user cadences gate the actual work — so an hourly tick is
# safe and cheap. Requires the CRON_SECRET repo secret (Settings → Secrets →
# Actions) matching the env var on the hermes-api Cloud Run service.
name: Discovery tick

on:
  schedule:
    - cron: "0 * * * *" # hourly (GitHub may delay scheduled runs by a few minutes)
  workflow_dispatch:

concurrency:
  group: discovery-tick
  cancel-in-progress: false

jobs:
  tick:
    name: Tick auto-discovery scheduler
    runs-on: ubuntu-latest
    steps:
      - name: POST /internal/cron/tick
        env:
          API_BASE: https://hermes-api-812714701339.us-central1.run.app
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is not set"; exit 1
          fi
          # Retry transient failures (cold start / 5xx); 403/503 mean
          # misconfiguration and fail immediately via the status check below.
          status=$(curl -sS -o response.txt -w '%{http_code}' \
            --retry 3 --retry-delay 10 --max-time 60 \
            -X POST "$API_BASE/internal/cron/tick" \
            -H "X-Cron-Secret: $CRON_SECRET")
          echo "HTTP $status: $(cat response.txt)"
          [ "$status" = "200" ]
