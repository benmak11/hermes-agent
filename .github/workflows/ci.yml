# CI + deploy. Lint/type/test gates run on every PR and on pushes to main;
# the deploy job runs only on main and only after both gates pass, so a red
# build can never reach Cloud Run. PR runs need no cloud credentials.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: # manual deploy: run on main, gates re-run first

concurrency:
  group: ci-${{ github.ref }}
  # Dedupe force-push spam on PRs, but never cancel a main run — killing an
  # in-flight gcloud deploy mid-rollout is worse than a queued duplicate.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  backend:
    name: Backend (ruff + ty + codespell + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync deps
        # --extra lint pulls the pinned ruff/ty/codespell from uv.lock so CI
        # checks with the same versions developers get, not floating uvx ones.
        run: uv sync --all-groups --extra lint --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Type check
        run: uv run ty check
      - name: Spell check
        run: uv run codespell
      - name: Unit tests
        run: uv run pytest tests/unit -q

  web:
    name: Web (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      # NEXT_PUBLIC_* are inlined at build time and Firebase init throws on a
      # missing apiKey during prerender. These are public-by-design (they ship in
      # every browser bundle; same values as web/Dockerfile), so it's safe to set
      # them here for the build to succeed without the local .env.local.
      - run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBSj-y9gCo71VzG7CTQ791VXjv-5QcVdiw
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: hermes-agent-btm-001.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: hermes-agent-btm-001
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:812714701339:web:d258dd8cc3084a76f23ebe
          NEXT_PUBLIC_API_BASE: https://hermes-api-812714701339.us-central1.run.app

  changes:
    name: Detect what changed
    # Merge-to-main (or manual dispatch on main) only, and only when both
    # gates are green — the deploy jobs below replace the old standalone
    # deploy.yml, which fired on every main push regardless of CI status.
    # Most merges touch one side only, so each service deploys only when its
    # own inputs changed; a manual dispatch always deploys both.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: [backend, web]
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          # base == the pushed branch, so the diff covers exactly the commits
          # in this push (i.e. the merged PR).
          base: main
          # The api list is everything the API image's Dockerfile COPYs, plus
          # the Dockerfile itself. Keep in sync with /Dockerfile.
          filters: |
            api:
              - "agents/**"
              - "api/**"
              - "models/**"
              - "tools/**"
              - "cli/**"
              - "obs/**"
              - "pyproject.toml"
              - "uv.lock"
              - "Dockerfile"
              - "README.md"
            web:
              - "web/**"

  deploy-api:
    name: Deploy hermes-api
    if: >-
      github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.api == 'true')
    needs: [backend, web, changes]
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-api
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    env:
      GCP_PROJECT: hermes-agent-btm-001
      GCP_REGION: us-central1
      IMAGE: us-central1-docker.pkg.dev/hermes-agent-btm-001/hermes/hermes-api
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # Build in Actions with a layer cache instead of `deploy --source`
      # (Cloud Build), which re-pulled the ~2GB Playwright base and re-ran
      # `uv sync` from scratch on every deploy. With warm caches a code-only
      # change rebuilds only the COPY layers.
      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy hermes-api
        run: |
          gcloud run deploy hermes-api \
            --image "$IMAGE:${{ github.sha }}" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT" \
            --quiet

      # hermes-worker runs the same image (WORKER_MODE=1 is what makes it the
      # worker). Its first deploy is manual — see worker.tf — so skip until
      # the service exists rather than create it here with default flags.
      - name: Deploy hermes-worker (same image)
        run: |
          if gcloud run services describe hermes-worker \
               --region "$GCP_REGION" --project "$GCP_PROJECT" \
               --format 'value(metadata.name)' >/dev/null 2>&1; then
            gcloud run deploy hermes-worker \
              --image "$IMAGE:${{ github.sha }}" \
              --region "$GCP_REGION" \
              --project "$GCP_PROJECT" \
              --quiet
          else
            echo "hermes-worker not created yet; skipping (first deploy is manual)"
          fi

  deploy-web:
    name: Deploy hermes-web
    if: >-
      github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true')
    needs: [backend, web, changes]
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    env:
      GCP_PROJECT: hermes-agent-btm-001
      GCP_REGION: us-central1
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy hermes-web
        run: |
          gcloud run deploy hermes-web \
            --source web \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT" \
            --quiet
